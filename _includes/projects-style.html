<style>
/* Projects List Styling */
#project-list .card-wrapper {
  margin-bottom: 1.5rem;
}

#project-list .card.post-preview {
  max-height: 200px;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  cursor: pointer;
  position: relative;
}

#project-list .card.post-preview:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

/* Make entire card clickable */
#project-list .card-link-wrapper {
  display: block;
  text-decoration: none;
  color: inherit;
}

#project-list .card-link-wrapper:hover {
  text-decoration: none;
  color: inherit;
}

/* Thumbnail image styling - fixed size, doesn't affect card height */
#project-list .post-image {
  width: 200px;
  min-width: 200px;
  max-width: 200px;
  height: 200px;
  overflow: hidden;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--bs-gray-100, #f8f9fa);
}

#project-list .post-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* Prevent image links from interfering with card link */
#project-list .post-image a {
  pointer-events: none;
  display: block;
  width: 100%;
  height: 100%;
}

#project-list .post-image a img {
  pointer-events: none;
}

/* Card body styling */
#project-list .card-body {
  max-height: 200px;
  overflow: hidden;
  padding: 1rem;
  position: relative;
  z-index: 0;
}

/* Title styling with ellipsis */
#project-list .card-title {
  font-size: 1.25rem;
  margin-bottom: 0.5rem;
  line-height: 1.4;
  max-height: 2.8em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  text-overflow: ellipsis;
}

#project-list .card-title a {
  color: inherit;
  text-decoration: none;
  pointer-events: none; /* Prevent nested link clicks */
}

#project-list .card-title a:hover {
  color: var(--bs-primary, #0066cc);
}

/* Post meta styling */
#project-list .post-meta {
  font-size: 0.875rem;
  margin-bottom: 0.5rem;
  flex-shrink: 0;
}

/* Post content/excerpt styling with ellipsis */
#project-list .post-content {
  flex: 1;
  overflow: hidden;
  margin-bottom: 0.5rem;
}

#project-list .post-content p {
  margin: 0;
  line-height: 1.5;
  max-height: 3em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  text-overflow: ellipsis;
}

/* Read more link - hide since whole card is clickable */
#project-list .read-more {
  display: none;
}

/* Responsive adjustments */
@media (max-width: 767.98px) {
  #project-list .post-image {
    width: 100%;
    max-width: 100%;
    height: 150px;
    min-width: 100%;
  }
  
  #project-list .card.post-preview {
    flex-direction: column !important;
    max-height: none;
  }
  
  #project-list .card-body {
    max-height: none;
  }
  
  #project-list .card-title {
    max-height: none;
    -webkit-line-clamp: 3;
  }
  
  #project-list .post-content p {
    max-height: none;
    -webkit-line-clamp: 3;
  }
}

/* Ensure categories don't overflow */
#project-list .categories {
  display: inline-block;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
</style>
